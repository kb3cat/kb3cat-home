<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact & Suggestions - KB3CAT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #1a1a1a;
      border: 1px solid #2a2a2d;
      padding: 25px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00bfff;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      background: #111;
      color: #fff;
    }

    textarea {
      resize: vertical;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #00bfff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      background: #33ccff;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
      text-align: center;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #00bfff;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Contact & Suggestions</h1>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

    <!-- ✅ Redirect AFTER submit -->
    <input type="hidden" name="_redirect" value="https://alerts.kb3cat.com/thanks.html">

    <!-- Subject -->
    <input type="hidden" name="_subject" value="PA Alerts Contact/Suggestion Submission">

    <!-- Honeypot spam protection -->
    <input type="text" name="_gotcha" style="display:none">

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Topic</label>
    <select name="topic" required>
      <option value="">Select one</option>
      <option>General Question</option>
      <option>Bug Report</option>
      <option>Dashboard Suggestion</option>
      <option>Data Issue</option>
      <option>Other</option>
    </select>

    <label>Page / Dashboard</label>
    <input type="text" name="dashboard" placeholder="Example: Weather Alerts, Airports, Traffic">

    <label>Message</label>
    <textarea name="message" rows="6" required></textarea>

    <button type="submit">Send Message</button>

    <div class="note">
      This form is for website feedback only and is not monitored for emergencies.
    </div>

  </form>

  <a href="index.html" class="back-link">← Back to Dashboard</a>

</div>

</body>
</html>
