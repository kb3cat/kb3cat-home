<!DOCTYPE html>
<html>
<head>
  <title>KB3CAT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      color: #fff;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .links {
      margin-top: 15px;
      display: grid;
      gap: 10px;
    }

    .link {
      display: block;
      padding: 12px;
      background: #111;
      border-radius: 8px;
      text-decoration: none;
      color: #0af;
      text-align: center;
    }

    .link:hover {
      background: #222;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.75;
    }
  </style>
</head>
<body>

<h1>KB3CAT Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="title">Active Alerts</div>
    <div class="value" id="alertsCount">--</div>
  </div>

  <div class="card">
    <div class="title">Major Closures</div>
    <div class="value" id="closuresCount">--</div>
  </div>

  <div class="card">
    <div class="title">Last Update</div>
    <div class="value" id="lastUpdated">--</div>
  </div>
</div>

<div class="links">
  <a class="link" href="https://alerts.kb3cat.com/hazards.html">Alerts</a>
  <a class="link" href="https://alerts.kb3cat.com/traffic.html">Traffic</a>
  <a class="link" href="https://alerts.kb3cat.com/stormreports.html">Storm Reports</a>
  <a class="link" href="https://alerts.kb3cat.com/airports.html">Airports</a>
</div>

<div class="status" id="statusText">Loading dashboard data...</div>

<div class="footer">
  Data updates via GitHub Actions
</div>

<script>
const DATA_BASE = "https://alerts.kb3cat.com/data/";

async function fetchJson(path) {
  const res = await fetch(DATA_BASE + path + "?v=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(path + " failed: " + res.status);
  return res.json();
}

function countItems(data) {
  if (Array.isArray(data)) return data.length;
  if (Array.isArray(data.items)) return data.items.length;
  if (Array.isArray(data.alerts)) return data.alerts.length;
  if (Array.isArray(data.features)) return data.features.length;
  if (Array.isArray(data.closures)) return data.closures.length;
  if (typeof data.count === "number") return data.count;
  return 0;
}

function formatTime(value) {
  if (!value) return "--";

  const d = new Date(value);
  if (isNaN(d)) return String(value);

  return d.toLocaleString([], {
    month: "2-digit",
    day: "2-digit",
    year: "2-digit",
    hour: "numeric",
    minute: "2-digit"
  });
}

async function loadDashboard() {
  let ok = true;

  try {
    const alerts = await fetchJson("alerts.json");
    document.getElementById("alertsCount").textContent = countItems(alerts);
  } catch (e) {
    document.getElementById("alertsCount").textContent = "N/A";
    ok = false;
  }

  try {
    const closures = await fetchJson("major_route_closures.json");
    document.getElementById("closuresCount").textContent = countItems(closures);
  } catch (e) {
    document.getElementById("closuresCount").textContent = "N/A";
    ok = false;
  }

  try {
    const lastRun = await fetchJson("last_run.json");
    document.getElementById("lastUpdated").textContent =
      formatTime(
        lastRun.ran_at ||
        lastRun.last_run ||
        lastRun.updated ||
        lastRun.timestamp ||
        lastRun.time ||
        lastRun.fetched_at
      );
  } catch (e) {
    document.getElementById("lastUpdated").textContent = "N/A";
    ok = false;
  }

  document.getElementById("statusText").textContent =
    ok ? "Dashboard data loaded." : "Some dashboard data could not be loaded.";
}

loadDashboard();
setInterval(loadDashboard, 5 * 60 * 1000);
</script>

</body>
</html>
