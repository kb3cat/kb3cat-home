<!DOCTYPE html>
<html>
<head>
  <title>KB3CAT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      color: #fff;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .summary {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.4;
    }

    .closure-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid #333;
    }

    .closure-row:first-child {
      border-top: none;
    }

    .route-icon {
      width: 34px;
      height: 24px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .links {
      margin-top: 15px;
      display: grid;
      gap: 10px;
    }

    .link {
      display: block;
      padding: 12px;
      background: #111;
      border-radius: 8px;
      text-decoration: none;
      color: #0af;
      text-align: center;
    }

    .link:hover {
      background: #222;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.75;
    }
  </style>
</head>
<body>

<h1>KB3CAT Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="title">Active Watches and Warnings</div>
    <div class="value" id="watchWarningCount">--</div>
    <div class="summary" id="watchWarningSummary"></div>
  </div>

  <div class="card">
    <div class="title">Major Route Closures</div>
    <div class="value" id="closuresCount">--</div>
    <div class="summary" id="closuresSummary"></div>
  </div>

  <div class="card">
    <div class="title">Last Update</div>
    <div class="value" id="lastUpdated">--</div>
  </div>
</div>

<div class="links">
  <a class="link" href="https://alerts.kb3cat.com/hazards.html">Pennsylvania Weather Alerts</a>
  <a class="link" href="https://alerts.kb3cat.com/traffic.html">Pennsylvania Traffic</a>
  <a class="link" href="https://alerts.kb3cat.com/stormreports.html">Pennsylvania Storm Reports</a>
  <a class="link" href="https://alerts.kb3cat.com/airports.html">Pennsylvania Airport Statuses</a>
</div>

<div class="status" id="statusText">Loading dashboard data...</div>

<div class="footer">
  Data updates via GitHub Actions
</div>

<script>
const DATA_BASE = "https://alerts.kb3cat.com/data/";

async function fetchJson(path) {
  const res = await fetch(DATA_BASE + path + "?v=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(path + " failed: " + res.status);
  return res.json();
}

function getArray(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.items)) return data.items;
  if (Array.isArray(data.alerts)) return data.alerts;
  if (Array.isArray(data.features)) return data.features;
  return [];
}

function formatTime(value) {
  if (!value) return "--";
  const d = new Date(value);
  if (isNaN(d)) return String(value);

  return d.toLocaleString([], {
    month: "2-digit",
    day: "2-digit",
    year: "2-digit",
    hour: "numeric",
    minute: "2-digit"
  });
}

function isWatchOrWarning(alert) {
  const text = (
    alert.event ||
    alert.type ||
    alert.headline ||
    alert.title ||
    alert.name ||
    ""
  ).toLowerCase();

  return text.includes("warning") || text.includes("watch");
}

function getAlertName(alert) {
  return alert.event || alert.type || alert.headline || alert.title || alert.name || "Alert";
}

function getRouteIcon(route) {
  if (!route) return "";

  const clean = String(route).toUpperCase().replace(/\s+/g, "");

  let typ = "";
  let num = "";

  if (/^I-?\d+/.test(clean)) {
    typ = "i";
    num = clean.replace(/^I-?/, "");
  } else if (/^US-?\d+/.test(clean)) {
    typ = "us";
    num = clean.replace(/^US-?/, "");
  } else if (/^PA-?\d+/.test(clean)) {
    typ = "pa";
    num = clean.replace(/^PA-?/, "");
  }

  if (!typ || !num) return "";

  return `${DATA_BASE}icons/${typ}${num}.small.png?v=${Date.now()}`;
}

function renderWatchWarnings(alerts) {
  const filtered = getArray(alerts).filter(isWatchOrWarning);

  document.getElementById("watchWarningCount").textContent =
    filtered.length ? filtered.length : "None";

  const summary = document.getElementById("watchWarningSummary");

  if (!filtered.length) {
    summary.textContent = "";
    return;
  }

  summary.innerHTML = filtered
    .slice(0, 5)
    .map(a => `<div>${getAlertName(a)}</div>`)
    .join("");
}

function renderClosures(closuresData) {
  const closures = getArray(closuresData);

  document.getElementById("closuresCount").textContent =
    closures.length ? closures.length : "None";

  const summary = document.getElementById("closuresSummary");

  if (!closures.length) {
    summary.textContent = "";
    return;
  }

  summary.innerHTML = closures.map(c => {
    const route = c.route || "";
    const direction = c.direction ? ` ${c.direction}` : "";
    const county = c.county ? ` (${c.county})` : "";
    const icon = getRouteIcon(route);

    return `
      <div class="closure-row">
        ${icon ? `<img class="route-icon" src="${icon}" alt="">` : ""}
        <div><strong>${route}</strong>${direction}${county}</div>
      </div>
    `;
  }).join("");
}

async function loadDashboard() {
  let ok = true;

  try {
    const alerts = await fetchJson("alerts.json");
    renderWatchWarnings(alerts);
  } catch (e) {
    document.getElementById("watchWarningCount").textContent = "N/A";
    ok = false;
  }

  try {
    const closures = await fetchJson("major_route_closures.json");
    renderClosures(closures);
  } catch (e) {
    document.getElementById("closuresCount").textContent = "N/A";
    ok = false;
  }

  try {
    const lastRun = await fetchJson("last_run.json");
    document.getElementById("lastUpdated").textContent =
      formatTime(
        lastRun.ran_at ||
        lastRun.last_run ||
        lastRun.updated ||
        lastRun.timestamp ||
        lastRun.time ||
        lastRun.fetched_at
      );
  } catch (e) {
    document.getElementById("lastUpdated").textContent = "N/A";
    ok = false;
  }

  document.getElementById("statusText").textContent =
    ok ? "Dashboard data loaded." : "Some dashboard data could not be loaded.";
}

loadDashboard();
setInterval(loadDashboard, 5 * 60 * 1000);
</script>

</body>
</html>
