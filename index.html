<!DOCTYPE html>
<html>
<head>
  <title>KB3CAT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h1 { text-align: center; margin-bottom: 15px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
    }

    .title { font-size: 18px; font-weight: bold; }
    .value { font-size: 28px; font-weight: bold; }

    .summary { margin-top: 10px; font-size: 14px; }

    .closure-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid #333;
    }

    .route-icon {
      width: 36px;
      height: 24px;
      object-fit: contain;
    }

    .links {
      margin-top: 15px;
      display: grid;
      gap: 10px;
    }

    .link {
      padding: 12px;
      background: #111;
      border-radius: 8px;
      text-align: center;
      color: #0af;
      text-decoration: none;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<h1>KB3CAT Dashboard</h1>

<div class="grid">

  <div class="card">
    <div class="title">Active Watches and Warnings</div>
    <div class="value" id="alertsCount">--</div>
    <div class="summary" id="alertsSummary"></div>
  </div>

  <div class="card">
    <div class="title">Major Route Closures</div>
    <div class="value" id="closuresCount">--</div>
    <div class="summary" id="closuresSummary"></div>
  </div>

  <div class="card">
    <div class="title">Last Update</div>
    <div class="value" id="lastUpdated">--</div>
  </div>

</div>

<div class="links">
  <a class="link" href="https://alerts.kb3cat.com/hazards.html">Weather Alerts</a>
  <a class="link" href="https://alerts.kb3cat.com/traffic.html">Traffic</a>
  <a class="link" href="https://alerts.kb3cat.com/stormreports.html">Storm Reports</a>
  <a class="link" href="https://alerts.kb3cat.com/airports.html">Airports</a>
</div>

<div class="status" id="statusText">Loading...</div>

<script>
const TRAFFIC_BASE = "https://alerts.kb3cat.com/data/";
const NWS_URL = "https://api.weather.gov/alerts/active?area=PA";

/* ---------------- ICON HANDLING ---------------- */

function getRouteIconCandidates(route) {
  if (!route) return [];

  const clean = route.toUpperCase().replace(/\s+/g, "");
  const noDash = clean.replace("-", "").toLowerCase();
  const withDash = clean.includes("-") ? clean.toLowerCase() : clean.replace(/^([A-Z]+)(\d+)/, "$1-$2").toLowerCase();

return [
  `${TRAFFIC_BASE}icons/${noDash}small.png`,
  `${TRAFFIC_BASE}icons/${withDash.replace("-", "")}small.png`,
  `${TRAFFIC_BASE}icons/${noDash}.small.png`,
  `${TRAFFIC_BASE}icons/${withDash}.small.png`,
  `${TRAFFIC_BASE}icons/${noDash}.png`,
  `${TRAFFIC_BASE}icons/${withDash}.png`
];
}

function tryNextIcon(img) {
  const list = JSON.parse(img.dataset.icons || "[]");
  list.shift();

  if (!list.length) {
    img.style.display = "none";
    return;
  }

  img.dataset.icons = JSON.stringify(list);
  img.src = list[0] + "?v=" + Date.now();
}

/* ---------------- WEATHER ALERTS ---------------- */

function isValidAlert(p) {
  const e = (p.event || "").toLowerCase();
  return (
    (e.includes("watch") || e.includes("warning") || e.includes("emergency")) &&
    !e.includes("advisory")
  );
}

function renderAlerts(data) {
  const alerts = (data.features || [])
    .map(f => f.properties)
    .filter(isValidAlert);

  const countEl = document.getElementById("alertsCount");
  const summaryEl = document.getElementById("alertsSummary");

  if (!alerts.length) {
    countEl.textContent = "None";
    summaryEl.innerHTML = "";
    return;
  }

  countEl.textContent = alerts.length;

  summaryEl.innerHTML = alerts.slice(0,5).map(a => `
    <div>
      <strong>${a.event}</strong><br>
      ${a.areaDesc}
    </div>
  `).join("");
}

/* ---------------- TRAFFIC ---------------- */

function renderClosures(data) {
  const closures = data.items || [];

  const countEl = document.getElementById("closuresCount");
  const summaryEl = document.getElementById("closuresSummary");

  if (!closures.length) {
    countEl.textContent = "None";
    summaryEl.innerHTML = "";
    return;
  }

  countEl.textContent = closures.length;

  summaryEl.innerHTML = closures.map(c => {
    const icons = getRouteIconCandidates(c.route);

    return `
      <div class="closure-row">
        <img class="route-icon"
             src="${icons[0]}?v=${Date.now()}"
             data-icons='${JSON.stringify(icons)}'
             onerror="tryNextIcon(this)">
        <div><strong>${c.route} ${c.direction} (${c.county})</strong></div>
      </div>
    `;
  }).join("");
}

/* ---------------- LOAD ---------------- */

async function loadDashboard() {

  try {
    const alerts = await fetch(NWS_URL).then(r => r.json());
    renderAlerts(alerts);
  } catch {
    // IMPORTANT: fallback = NONE, not N/A
    document.getElementById("alertsCount").textContent = "None";
  }

  try {
    const closures = await fetch(TRAFFIC_BASE + "major_route_closures.json").then(r => r.json());
    renderClosures(closures);
  } catch {
    document.getElementById("closuresCount").textContent = "None";
  }

  try {
    const last = await fetch(TRAFFIC_BASE + "last_run.json").then(r => r.json());
    document.getElementById("lastUpdated").textContent =
      new Date(last.ran_at).toLocaleString();
  } catch {
    document.getElementById("lastUpdated").textContent = "--";
  }

  document.getElementById("statusText").textContent = "Live";
}

loadDashboard();
setInterval(loadDashboard, 300000);
</script>

</body>
</html>
