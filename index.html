<!DOCTYPE html>
<html>
<head>
  <title>KB3CAT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
    }

    .card:hover {
      background: #222;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .links {
      margin-top: 15px;
      display: grid;
      gap: 10px;
    }

    .link {
      display: block;
      padding: 12px;
      background: #111;
      border-radius: 8px;
      text-decoration: none;
      color: #0af;
      text-align: center;
    }

    .link:hover {
      background: #222;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<h1>KB3CAT Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="title">Active Alerts</div>
    <div class="value" id="alertsCount">--</div>
  </div>

  <div class="card">
    <div class="title">Major Closures</div>
    <div class="value" id="closuresCount">--</div>
  </div>

  <div class="card">
    <div class="title">Last Update</div>
    <div class="value" id="lastUpdated">--</div>
  </div>
</div>

<div class="links">
  <a class="link" href="/alerts.html">Alerts</a>
  <a class="link" href="/traffic.html">Traffic</a>
  <a class="link" href="/storms.html">Storm Reports</a>
  <a class="link" href="/airports.html">Airports</a>
</div>

<div class="footer">
  Data updates every few minutes via GitHub Actions
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/data/last_run.json");
    const data = await res.json();

    document.getElementById("lastUpdated").textContent =
      new Date(data.last_run).toLocaleTimeString();
  } catch {}
  
  try {
    const alerts = await fetch("/data/alerts.json").then(r => r.json());
    document.getElementById("alertsCount").textContent =
      alerts.length || 0;
  } catch {}

  try {
    const traffic = await fetch("/data/major_route_closures.json").then(r => r.json());
    document.getElementById("closuresCount").textContent =
      traffic.length || 0;
  } catch {}
}

loadData();
</script>

</body>
</html>
