<!DOCTYPE html>
<html>
<head>
  <title>KB3CAT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      color: #fff;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .summary {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.45;
    }

    .summary-row {
      padding: 6px 0;
      border-top: 1px solid #333;
    }

    .summary-row:first-child {
      border-top: none;
    }

    .closure-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid #333;
    }

    .closure-row:first-child {
      border-top: none;
    }

    .route-icon {
      width: 34px;
      height: 24px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .links {
      margin-top: 15px;
      display: grid;
      gap: 10px;
    }

    .link {
      display: block;
      padding: 12px;
      background: #111;
      border-radius: 8px;
      text-decoration: none;
      color: #0af;
      text-align: center;
    }

    .link:hover {
      background: #222;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.75;
    }
  </style>
</head>

<body>

<h1>KB3CAT Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="title">Active Watches and Warnings</div>
    <div class="value" id="watchWarningCount">--</div>
    <div class="summary" id="watchWarningSummary"></div>
  </div>

  <div class="card">
    <div class="title">Major Route Closures</div>
    <div class="value" id="closuresCount">--</div>
    <div class="summary" id="closuresSummary"></div>
  </div>

  <div class="card">
    <div class="title">Last Update</div>
    <div class="value" id="lastUpdated">--</div>
  </div>
</div>

<div class="links">
  <a class="link" href="https://alerts.kb3cat.com/hazards.html">Pennsylvania Weather Alerts</a>
  <a class="link" href="https://alerts.kb3cat.com/traffic.html">Pennsylvania Traffic</a>
  <a class="link" href="https://alerts.kb3cat.com/stormreports.html">Pennsylvania Storm Reports</a>
  <a class="link" href="https://alerts.kb3cat.com/airports.html">Pennsylvania Airport Statuses</a>
</div>

<div class="status" id="statusText">Loading dashboard data...</div>

<div class="footer">
  Data updates via GitHub Actions and live NWS API
</div>

<script>
const TRAFFIC_DATA_BASE = "https://alerts.kb3cat.com/data/";
const NWS_ALERTS_URL = "https://api.weather.gov/alerts/active?area=PA";

async function fetchJson(url) {
  const res = await fetch(url + (url.includes("?") ? "&" : "?") + "v=" + Date.now(), {
    cache: "no-store",
    headers: { "Accept": "application/geo+json, application/json" }
  });

  if (!res.ok) throw new Error(url + " failed: " + res.status);
  return res.json();
}

function getArray(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.items)) return data.items;
  if (Array.isArray(data.alerts)) return data.alerts;
  if (Array.isArray(data.features)) return data.features;
  return [];
}

function formatTime(value) {
  if (!value) return "--";

  const d = new Date(value);
  if (isNaN(d)) return String(value);

  return d.toLocaleString([], {
    month: "2-digit",
    day: "2-digit",
    year: "2-digit",
    hour: "numeric",
    minute: "2-digit"
  });
}

function escapeHtml(s) {
  return String(s ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function isWatchWarningEmergencyOnly(props) {
  const e = String(props.event || "").toLowerCase();

  const wanted =
    e.includes("watch") ||
    e.includes("warning") ||
    e.includes("emergency");

  const unwanted =
    e.includes("advisory") ||
    e.includes("statement") ||
    e.includes("outlook") ||
    e.includes("test");

  return wanted && !unwanted;
}

function renderWatchWarnings(data) {
  const features = Array.isArray(data.features) ? data.features : [];

  const alerts = features
    .map(f => f.properties || {})
    .filter(isWatchWarningEmergencyOnly);

  const countEl = document.getElementById("watchWarningCount");
  const summaryEl = document.getElementById("watchWarningSummary");

  if (!alerts.length) {
    countEl.textContent = "None";
    summaryEl.innerHTML = "";
    return;
  }

  countEl.textContent = alerts.length;

  summaryEl.innerHTML = alerts.slice(0, 6).map(a => {
    const event = escapeHtml(a.event || "Alert");
    const areas = escapeHtml(a.areaDesc || "Pennsylvania");
    const expires = escapeHtml(formatTime(a.ends || a.expires));

    return `
      <div class="summary-row">
        <strong>${event}</strong><br>
        ${areas}<br>
        <span style="opacity:.75;">Expires: ${expires}</span>
      </div>
    `;
  }).join("");
}

function getRouteIcon(route) {
  if (!route) return "";

  const clean = String(route).toUpperCase().replace(/\s+/g, "");

  let typ = "";
  let num = "";

  if (/^I-?\d+/.test(clean)) {
    typ = "i";
    num = clean.replace(/^I-?/, "");
  } else if (/^US-?\d+/.test(clean)) {
    typ = "us";
    num = clean.replace(/^US-?/, "");
  } else if (/^PA-?\d+/.test(clean)) {
    typ = "pa";
    num = clean.replace(/^PA-?/, "");
  }

  if (!typ || !num) return "";

  return `${TRAFFIC_DATA_BASE}icons/${typ}${num}.small.png?v=${Date.now()}`;
}

function renderClosures(data) {
  const closures = getArray(data);

  const countEl = document.getElementById("closuresCount");
  const summaryEl = document.getElementById("closuresSummary");

  if (!closures.length) {
    countEl.textContent = "None";
    summaryEl.innerHTML = "";
    return;
  }

  countEl.textContent = closures.length;

  summaryEl.innerHTML = closures.map(c => {
    const route = escapeHtml(c.route || "");
    const direction = c.direction ? ` ${escapeHtml(c.direction)}` : "";
    const county = c.county ? ` (${escapeHtml(c.county)})` : "";
    const icon = getRouteIcon(c.route);

    return `
      <div class="closure-row">
        ${icon ? `<img class="route-icon" src="${icon}" alt="">` : ""}
        <div><strong>${route}${direction}${county}</strong></div>
      </div>
    `;
  }).join("");
}

async function loadDashboard() {
  let ok = true;

  try {
    const alerts = await fetchJson(NWS_ALERTS_URL);
    renderWatchWarnings(alerts);
  } catch (e) {
    console.error("Weather alerts failed:", e);
    document.getElementById("watchWarningCount").textContent = "N/A";
    ok = false;
  }

  try {
    const closures = await fetchJson(TRAFFIC_DATA_BASE + "major_route_closures.json");
    renderClosures(closures);
  } catch (e) {
    console.error("Closures failed:", e);
    document.getElementById("closuresCount").textContent = "N/A";
    ok = false;
  }

  try {
    const lastRun = await fetchJson(TRAFFIC_DATA_BASE + "last_run.json");
    document.getElementById("lastUpdated").textContent =
      formatTime(
        lastRun.ran_at ||
        lastRun.last_run ||
        lastRun.updated ||
        lastRun.timestamp ||
        lastRun.time ||
        lastRun.fetched_at
      );
  } catch (e) {
    console.error("Last update failed:", e);
    document.getElementById("lastUpdated").textContent = "N/A";
    ok = false;
  }

  document.getElementById("statusText").textContent =
    ok ? "Dashboard data loaded." : "Some dashboard data could not be loaded.";
}

loadDashboard();
setInterval(loadDashboard, 5 * 60 * 1000);
</script>

</body>
</html>
