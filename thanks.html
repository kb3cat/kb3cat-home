<!DOCTYPE html>
<html>
<head>
  <title>Message Sent - KB3CAT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      max-width: 600px;
      background: #1a1a1a;
      border: 1px solid #2a2a2d;
      border-radius: 14px;
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #00bfff;
    }

    p {
      color: #ccc;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 18px;
      background: #00bfff;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.15s;
    }

    .button:hover {
      background: #33ccff;
    }

    .small {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Message Sent</h1>

    <p>
      Thanks for contacting KB3CAT / PennAlerts. Your message has been submitted.
    </p>

    <p>
      This form is for website feedback and suggestions only and is not monitored for emergencies.
    </p>

    <a class="button" href="index.html">
      Return to Dashboard
    </a>

    <div class="small">
      KB3CAT Dashboard
    </div>
  </div>

</body>
</html>
